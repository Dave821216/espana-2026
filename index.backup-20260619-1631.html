<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>España 2026 — Dave, Kelly & Jacobo</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root {
      --rojo: #c0392b;
      --rojo-oscuro: #922b21;
      --amarillo: #f39c12;
      --dorado: #d4a017;
      --azul: #2980b9;
      --verde: #27ae60;
      --naranja: #e67e22;
      --gris: #7f8c8d;
      --gris-claro: #eef0f2;
      --blanco: #ffffff;
      --fondo: #f2f3f7;
      --texto: #1a2535;
      --sombra: 0 2px 10px rgba(0,0,0,0.08);
      --sombra-md: 0 4px 20px rgba(0,0,0,0.12);
      --radio: 16px;
      --radio-sm: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--fondo);
      color: var(--texto);
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, var(--rojo) 0%, #7b241c 100%);
      color: white;
      padding: 22px 18px 18px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(192,57,43,0.3);
    }
    .header h1 { font-size: 21px; font-weight: 800; letter-spacing: -0.5px; }
    .header p { font-size: 12px; opacity: 0.8; margin-top: 3px; letter-spacing: 0.1px; }
    .header-meta { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .badge {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 4px 11px;
      font-size: 11px;
      font-weight: 700;
      backdrop-filter: blur(4px);
    }

    /* NAV TABS */
    .nav {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: rgba(255,255,255,0.95);
      border-top: 1px solid rgba(0,0,0,0.06);
      display: flex;
      z-index: 200;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
      backdrop-filter: blur(10px);
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 9px 4px 11px;
      border: none;
      background: none;
      cursor: pointer;
      color: #aab0bb;
      font-size: 10px;
      font-weight: 700;
      gap: 3px;
      transition: color 0.18s;
      letter-spacing: 0.2px;
    }
    .nav-btn .icon { font-size: 22px; transition: transform 0.2s cubic-bezier(0.34,1.5,0.64,1); }
    .nav-btn.active { color: var(--rojo); }
    .nav-btn.active .icon { transform: scale(1.2); }

    /* PAGES */
    .page { display: none; padding: 12px; }
    .page.active { display: block; }

    /* CARDS */
    .card {
      background: white;
      border-radius: var(--radio);
      padding: 16px;
      margin-bottom: 10px;
      box-shadow: var(--sombra);
    }

    /* ITINERARIO */
    .day-card {
      background: white;
      border-radius: var(--radio);
      margin-bottom: 10px;
      box-shadow: var(--sombra);
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .day-card:active { box-shadow: var(--sombra-md); }
    .day-header {
      display: flex;
      align-items: center;
      padding: 14px 14px;
      cursor: pointer;
      gap: 12px;
      transition: background 0.15s;
    }
    .day-header:active { background: #fafafa; }
    .day-number {
      background: linear-gradient(135deg, var(--rojo) 0%, var(--rojo-oscuro) 100%);
      color: white;
      border-radius: 12px;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 13px;
      flex-shrink: 0;
      box-shadow: 0 3px 8px rgba(192,57,43,0.35);
      letter-spacing: -0.3px;
    }
    .day-info { flex: 1; min-width: 0; }
    .day-title { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--texto); }
    .day-subtitle { font-size: 12px; color: var(--gris); margin-top: 2px; }
    .day-total {
      font-weight: 800;
      font-size: 14px;
      color: var(--rojo);
      white-space: nowrap;
    }
    .day-body {
      display: none;
      padding: 0 14px 16px;
      border-top: 1px solid var(--gris-claro);
    }
    .day-body.open { display: block; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
    .day-plan {
      font-size: 13.5px;
      color: #3d4f61;
      padding: 12px 0 8px;
      line-height: 1.6;
    }
    .day-travel {
      font-size: 12px;
      color: var(--azul);
      background: linear-gradient(135deg, #eaf4fb 0%, #d6eaf8 100%);
      border-radius: 10px;
      padding: 8px 12px;
      margin-bottom: 10px;
      border-left: 3px solid var(--azul);
      font-weight: 500;
    }
    .expense-list { margin-top: 6px; }
    .expense-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--gris-claro);
      font-size: 12px;
    }
    .expense-item:last-child { border-bottom: none; }
    .expense-name { flex: 1; color: var(--texto); }
    .expense-cat {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      margin-right: 8px;
      font-weight: 600;
    }
    .expense-amount { font-weight: 600; white-space: nowrap; }
    .cat-Alimentación { background: #fef9e7; color: #b7950b; }
    .cat-Transporte { background: #eaf4fb; color: #1a5276; }
    .cat-Hotel { background: #f4ecf7; color: #6c3483; }
    .cat-Entradas { background: #e9f7ef; color: #1e8449; }
    .cat-Celebración { background: #fdf2f8; color: #a04000; }
    .cat-Varios { background: #f2f3f4; color: #515a5a; }
    .cat-Vuelos { background: #eaf4fb; color: #154360; }
    .cat-default { background: var(--gris-claro); color: var(--gris); }

    /* GASTOS PAGE */
    .filter-row {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 10px;
      scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid #ddd;
      background: white;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: var(--gris);
      transition: all 0.15s;
    }
    .filter-chip.active {
      background: var(--rojo);
      border-color: var(--rojo);
      color: white;
    }
    .expense-full-item {
      background: white;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      box-shadow: var(--sombra);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .expense-full-left { flex: 1; min-width: 0; }
    .expense-full-name { font-weight: 600; font-size: 13px; }
    .expense-full-meta { font-size: 11px; color: var(--gris); margin-top: 2px; }
    .expense-full-amount { font-weight: 700; font-size: 15px; color: var(--texto); white-space: nowrap; }
    .expense-full-currency { font-size: 11px; color: var(--gris); }

    /* PRESUPUESTO PAGE */
    .budget-hero {
      background: linear-gradient(135deg, var(--rojo) 0%, #922b21 100%);
      color: white;
      border-radius: var(--radio);
      padding: 20px;
      margin-bottom: 10px;
      box-shadow: var(--sombra);
    }
    .budget-hero-label { font-size: 12px; opacity: 0.85; margin-bottom: 4px; }
    .budget-hero-amount { font-size: 32px; font-weight: 800; letter-spacing: -1px; }
    .budget-hero-sub { font-size: 12px; opacity: 0.75; margin-top: 4px; }
    .budget-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .budget-stat {
      background: white;
      border-radius: var(--radio);
      padding: 14px;
      box-shadow: var(--sombra);
      text-align: center;
    }
    .budget-stat-label { font-size: 11px; color: var(--gris); margin-bottom: 4px; }
    .budget-stat-val { font-size: 20px; font-weight: 800; color: var(--texto); }
    .budget-stat-sub { font-size: 10px; color: var(--gris); margin-top: 2px; }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--gris);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 14px 0 8px;
    }
    .bar-item { margin-bottom: 12px; }
    .bar-label-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 12px; }
    .bar-label { font-weight: 600; }
    .bar-track { background: var(--gris-claro); border-radius: 10px; height: 8px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 10px; transition: width 0.5s; }
    .cop-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .cop-table th { text-align: left; padding: 6px 4px; color: var(--gris); font-size: 11px; border-bottom: 1px solid var(--gris-claro); }
    .cop-table td { padding: 8px 4px; border-bottom: 1px solid var(--gris-claro); }
    .cop-table tr:last-child td { border-bottom: none; font-weight: 700; }
    .cop-table .right { text-align: right; }

    /* LUGARES PAGE */
    .lugar-card {
      background: white;
      border-radius: var(--radio);
      margin-bottom: 8px;
      box-shadow: var(--sombra);
      overflow: hidden;
    }
    .lugar-header {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      gap: 12px;
    }
    .lugar-emoji { font-size: 28px; }
    .lugar-info { flex: 1; }
    .lugar-name { font-weight: 700; font-size: 15px; }
    .lugar-desc { font-size: 12px; color: var(--gris); margin-top: 2px; }
    .lugar-days { font-size: 11px; color: var(--azul); margin-top: 4px; font-weight: 600; }
    .lugar-map-btn {
      background: var(--azul);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .lugar-highlights {
      display: none;
      padding: 0 14px 14px;
      border-top: 1px solid var(--gris-claro);
    }
    .lugar-highlights.open { display: block; }
    .lugar-highlights ul { margin-top: 10px; padding-left: 16px; }
    .lugar-highlights li { font-size: 13px; margin-bottom: 6px; color: var(--texto); }

    /* BUDGET BAR */
    .budget-bar-wrap { margin: 10px 0 6px; }
    .budget-bar-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--gris); margin-bottom: 5px; flex-wrap: wrap; gap: 2px; }
    .budget-edit-label { cursor: pointer; text-decoration: underline dotted; }
    .day-edit-btn { background: none; border: none; font-size: 16px; cursor: pointer; padding: 4px 6px; border-radius: 8px; line-height:1; opacity: 0.7; transition: opacity .15s, background .15s; }
    .day-edit-btn:active { opacity: 1; background: rgba(0,0,0,0.08); }
    .budget-bar-track { background: var(--gris-claro); border-radius: 10px; height: 8px; overflow: visible; display: flex; }
    .budget-bar-fill { height: 8px; border-radius: 10px 0 0 10px; transition: width 0.4s; }
    .budget-bar-over { height: 8px; background: var(--rojo); opacity: 0.35; border-radius: 0 10px 10px 0; }

    /* DAY NOTES */
    .day-notes-wrap { margin-top: 12px; border-top: 1px solid var(--gris-claro); padding-top: 10px; }
    .day-notes-label { font-size: 11px; font-weight: 700; color: var(--gris); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .note-saved { color: var(--verde); font-weight: 600; opacity: 0; transition: opacity 0.3s; font-size: 10px; }
    .day-notes-input {
      width: 100%;
      min-height: 70px;
      padding: 8px 10px;
      border: 1.5px solid #e8e8e8;
      border-radius: 10px;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      color: var(--texto);
      background: #fafafa;
      line-height: 1.5;
    }
    .day-notes-input:focus { outline: none; border-color: var(--dorado); background: white; }

    /* HIGHLIGHT EDIT */
    .highlight-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid var(--gris-claro);
      gap: 8px;
    }
    .highlight-item:last-child { border-bottom: none; }
    .hl-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #ccc;
      background: white;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
      position: relative;
    }
    .hl-check.hl-checked {
      background: var(--verde);
      border-color: var(--verde);
    }
    .hl-check.hl-checked::after {
      content: '✓';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      color: white;
      font-size: 12px;
      font-weight: 700;
    }
    .hl-text { font-size: 13px; flex: 1; transition: all 0.2s; }
    .hl-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .hl-btn { background: none; border: none; font-size: 14px; cursor: pointer; opacity: 0.5; padding: 2px; }
    .hl-btn:active { opacity: 1; }
    .hl-edit-input {
      flex: 1;
      padding: 5px 8px;
      border: 1.5px solid var(--rojo);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
    }
    .hl-save-btn {
      background: var(--verde);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .hl-add-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      align-items: center;
    }
    .hl-add-input {
      flex: 1;
      padding: 8px 10px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 13px;
      font-family: inherit;
    }
    .hl-add-input:focus { outline: none; border-color: var(--rojo); }
    .hl-add-btn {
      background: var(--rojo);
      color: white;
      border: none;
      border-radius: 10px;
      width: 36px;
      height: 36px;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ADD EXPENSE MODAL */
    .fab {
      position: fixed;
      bottom: 80px;
      right: 16px;
      width: 52px;
      height: 52px;
      background: var(--rojo);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 26px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(192,57,43,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 150;
      transition: transform 0.15s;
    }
    .fab:active { transform: scale(0.92); }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      z-index: 300;
      align-items: flex-end;
      transition: background 0.25s;
    }
    .modal-overlay.open { display: flex; background: rgba(0,0,0,0.5); }
    .modal {
      background: white;
      border-radius: 24px 24px 0 0;
      padding: 8px 16px 36px;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      animation: slideUp 0.3s cubic-bezier(0.34,1.1,0.64,1);
    }
    .modal::before {
      content: '';
      display: block;
      width: 36px;
      height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin: 10px auto 16px;
    }
    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-center {
      border-radius: 20px !important;
      padding: 20px 18px 24px !important;
      margin: 16px;
      animation: popIn 0.25s cubic-bezier(0.34,1.2,0.64,1) !important;
    }
    .modal-center::before { display: none !important; }
    @keyframes popIn {
      from { transform: scale(0.93); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .modal h3 { font-size: 18px; font-weight: 800; margin-bottom: 18px; color: var(--texto); }
    .form-group { margin-bottom: 12px; }
    .form-label { font-size: 12px; font-weight: 600; color: var(--gris); margin-bottom: 4px; display: block; }
    .form-input, .form-select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      background: white;
      color: var(--texto);
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: var(--rojo);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btn { transition: transform 0.12s, box-shadow 0.12s, opacity 0.12s; }
    .btn:active { transform: scale(0.97); opacity: 0.9; }
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--rojo) 0%, var(--rojo-oscuro) 100%);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      box-shadow: 0 4px 14px rgba(192,57,43,0.35);
      letter-spacing: 0.2px;
    }
    .btn-delete {
      width: 100%;
      padding: 12px;
      background: #fdf0f0;
      color: var(--rojo);
      border: 1.5px solid #f0b8b8;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-secondary {
      width: 100%;
      padding: 12px;
      background: #f0f1f4;
      color: #4a5568;
      border: none;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-4px);
      background: #1a2535;
      color: white;
      padding: 11px 22px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 600;
      z-index: 400;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.22);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ADDED EXPENSE tag */
    .tag-new {
      background: #e9f7ef;
      color: #1e8449;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 6px;
      margin-left: 6px;
    }

    /* Search */
    .search-input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      background: white;
      margin-bottom: 10px;
    }
    .search-input:focus { outline: none; border-color: var(--rojo); }

    .edit-btn {
      background: none;
      border: none;
      font-size: 14px;
      cursor: pointer;
      padding: 2px 4px;
      opacity: 0.5;
      flex-shrink: 0;
    }
    .edit-btn:active { opacity: 1; }

    .btn-backup, .btn-restore {
      display: block;
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .btn-backup {
      background: #eaf4fb;
      color: var(--azul);
      border: 1.5px solid #aed6f1;
    }
    .btn-restore {
      background: #e9f7ef;
      color: var(--verde);
      border: 1.5px solid #a9dfbf;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--gris);
    }
    .empty-state .emoji { font-size: 40px; margin-bottom: 10px; }
    .empty-state p { font-size: 14px; }
  </style>
</head>
<body>

<div class="header">
  <h1>🇪🇸 España 2026</h1>
  <p>Dave · Kelly · Jacobo</p>
  <div class="header-meta">
    <span class="badge">28 jun – 16 jul</span>
    <span class="badge">19 días</span>
    <span class="badge">3 viajeros</span>
  </div>
</div>

<!-- PAGES -->
<div id="page-itinerario" class="page active"></div>
<div id="page-gastos" class="page"></div>
<div id="page-presupuesto" class="page"></div>
<div id="page-lugares" class="page"></div>

<!-- NAV -->

<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">

    <h3 id="modal-title">➕ Nuevo gasto</h3>

      <label class="form-label">Nombre del gasto</label>

    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Valor</label>
        <input class="form-input" id="inp-valor" type="number" placeholder="0.00" step="0.01" min="0" />

        <label class="form-label">Moneda</label>

          <option value="USD">USD $</option>

        </select>

    </div>
    <div class="form-group">
      <label class="form-label">Categoría</label>
      <select class="form-select" id="inp-cat">

        <option>Entradas</option>
        <option>Celebración</option>
        <option>Varios</option>

      <select class="form-select" id="inp-dia"></select>

  </div>
</div>

function fmt(n, decimals) {
  if (isNaN(n)) return '0';
  var d = decimals !== undefined ? decimals : (n % 1 !== 0 ? 2 : 0);
  var parts = Number(n).toFixed(d).split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  return d > 0 ? parts.join(',') : parts[0];
}

let hiddenBase = JSON.parse(localStorage.getItem('espana_hidden') || '[]');

let checkedHighlights = JSON.parse(localStorage.getItem('espana_checked') || '{}');
let dayNotes = JSON.parse(localStorage.getItem('espana_notes') || '{}');
let customBudgets = JSON.parse(localStorage.getItem('espana_budgets') || '{}');
let customDays = JSON.parse(localStorage.getItem('espana_days') || '{}');
let noteTimers = {};
let activeFilter = 'Todos';
let currentPage = 'itinerario';
let editingId = null; // {type:'base'|'extra', index}

function saveState() {
  localStorage.setItem('espana_gastos', JSON.stringify(extraGastos));
  localStorage.setItem('espana_hidden', JSON.stringify(hiddenBase));
  localStorage.setItem('espana_highlights', JSON.stringify(customHighlights));
  localStorage.setItem('espana_checked', JSON.stringify(checkedHighlights));
  localStorage.setItem('espana_notes', JSON.stringify(dayNotes));
  localStorage.setItem('espana_budgets', JSON.stringify(customBudgets));
  localStorage.setItem('espana_days', JSON.stringify(customDays));
}

function saveNote(dia, value) {
  dayNotes[dia] = value;
  saveState();
  // update saved indicator
  const ind = document.getElementById('note-saved-' + dia);
  if (ind) { ind.style.opacity = 1; setTimeout(() => ind.style.opacity = 0, 1500); }
}

function onNoteInput(dia, value) {
  clearTimeout(noteTimers[dia]);
  noteTimers[dia] = setTimeout(() => saveNote(dia, value), 600);
}

function getPlannedEUR(dia) {
  if (customBudgets[dia] && customBudgets[dia].EUR !== undefined) return customBudgets[dia].EUR;
  return GASTOS_BASE.filter(g => g.dia === dia && g.moneda === 'EUR').reduce((s, g) => s + g.valor, 0);
}
function getPlannedUSD(dia) {
  if (customBudgets[dia] && customBudgets[dia].USD !== undefined) return customBudgets[dia].USD;
  return GASTOS_BASE.filter(g => g.dia === dia && g.moneda === 'USD').reduce((s, g) => s + g.valor, 0);
}

function openDayEdit(dia, event) {
  event.stopPropagation();
  _dayEditDia = dia;
  const base = ITINERARIO.find(d => d.dia === dia) || {};
  const over = customDays[dia] || {};
  document.getElementById('day-modal-num').textContent = 'D' + dia;
  document.getElementById('day-modal-ciudad').value = over.ciudad !== undefined ? over.ciudad : (base.ciudad || '');
  document.getElementById('day-modal-plan').value = over.plan !== undefined ? over.plan : (base.plan || '');
  document.getElementById('day-modal-viaje').value = over.viaje !== undefined ? over.viaje : (base.viaje || '');
  const ov = document.getElementById('day-modal-overlay');
  ov.style.display = 'flex';
  setTimeout(() => ov.classList.add('open'), 10);
}
function closeDayModal() {
  const ov = document.getElementById('day-modal-overlay');
  ov.classList.remove('open');
  setTimeout(() => ov.style.display = 'none', 200);
}
function closeDayModalOutside(e) {
  if (e.target === document.getElementById('day-modal-overlay')) closeDayModal();
}
function saveDayModal() {
  const base = ITINERARIO.find(d => d.dia === _dayEditDia) || {};
  const ciudad = document.getElementById('day-modal-ciudad').value.trim();
  const plan = document.getElementById('day-modal-plan').value.trim();
  const viaje = document.getElementById('day-modal-viaje').value.trim();
  if (!ciudad) { showToast('⚠️ La ciudad es obligatoria'); return; }
  customDays[_dayEditDia] = { ciudad, plan, viaje };
  saveState();
  closeDayModal();
  renderItinerario();
  const body = document.getElementById('day-body-' + _dayEditDia);
  if (body) body.classList.add('open');
  showToast('✅ Día actualizado');
}
function resetDayEdit() {
  const base = ITINERARIO.find(d => d.dia === _dayEditDia) || {};
  document.getElementById('day-modal-ciudad').value = base.ciudad || '';
  document.getElementById('day-modal-plan').value = base.plan || '';
  document.getElementById('day-modal-viaje').value = base.viaje || '';
}

let _budgetEditDia = null, _budgetEditMoneda = null;
function editBudget(dia, moneda, currentVal) {
  _budgetEditDia = dia;
  _budgetEditMoneda = moneda;
  document.getElementById('budget-modal-label').textContent = `Límite para Día ${dia} en ${moneda}:`;
  document.getElementById('budget-modal-input').value = currentVal;
  const ov = document.getElementById('budget-modal-overlay');
  ov.style.display = 'flex';
  setTimeout(() => ov.classList.add('open'), 10);
  setTimeout(() => document.getElementById('budget-modal-input').focus(), 50);
}
function closeBudgetModal() {
  const ov = document.getElementById('budget-modal-overlay');
  ov.classList.remove('open');
  setTimeout(() => ov.style.display = 'none', 200);
}
function closeBudgetModalOutside(e) {
  if (e.target === document.getElementById('budget-modal-overlay')) closeBudgetModal();
}
function saveBudgetModal() {
  const num = parseFloat(document.getElementById('budget-modal-input').value);
  if (isNaN(num) || num < 0) { showToast('⚠️ Valor inválido'); return; }
  if (!customBudgets[_budgetEditDia]) customBudgets[_budgetEditDia] = {};
  customBudgets[_budgetEditDia][_budgetEditMoneda] = num;
  saveState();
  closeBudgetModal();
  renderItinerario();
  const body = document.getElementById('day-body-' + _budgetEditDia);
  if (body) body.classList.add('open');
  showToast('✅ Presupuesto actualizado');
}

function toggleCheck(lugarIdx, itemIdx) {
  if (!checkedHighlights[lugarIdx]) checkedHighlights[lugarIdx] = [];
  const arr = checkedHighlights[lugarIdx];
  const pos = arr.indexOf(itemIdx);
  if (pos === -1) arr.push(itemIdx); else arr.splice(pos, 1);
  saveState();
  const li = document.getElementById('hl-' + lugarIdx + '-' + itemIdx);
  if (!li) return;
  const checked = checkedHighlights[lugarIdx].includes(itemIdx);
  li.querySelector('.hl-check').classList.toggle('hl-checked', checked);
  li.querySelector('.hl-text').style.textDecoration = checked ? 'line-through' : '';
  li.querySelector('.hl-text').style.opacity = checked ? '0.45' : '1';
}

function getLugarHighlights(i) {
  return customHighlights[i] !== undefined ? customHighlights[i] : [...LUGARES[i].highlights];
}

function saveHighlight(lugarIdx, itemIdx, value) {
  if (!customHighlights[lugarIdx]) customHighlights[lugarIdx] = [...LUGARES[lugarIdx].highlights];
  customHighlights[lugarIdx][itemIdx] = value;
  saveState();
  renderLugares();
  // reopen the card
  const el = document.getElementById('lugar-' + lugarIdx);
  if (el) { el.classList.add('open'); document.getElementById('lugar-btn-' + lugarIdx).textContent = 'Ver menos ▲'; }
}

function deleteHighlight(lugarIdx, itemIdx) {
  if (!customHighlights[lugarIdx]) customHighlights[lugarIdx] = [...LUGARES[lugarIdx].highlights];
  customHighlights[lugarIdx].splice(itemIdx, 1);
  saveState();
  renderLugares();
  const el = document.getElementById('lugar-' + lugarIdx);
  if (el) { el.classList.add('open'); document.getElementById('lugar-btn-' + lugarIdx).textContent = 'Ver menos ▲'; }
}

function addHighlight(lugarIdx) {
  const input = document.getElementById('new-highlight-' + lugarIdx);
  const val = input ? input.value.trim() : '';
  if (!val) return;
  if (!customHighlights[lugarIdx]) customHighlights[lugarIdx] = [...LUGARES[lugarIdx].highlights];
  customHighlights[lugarIdx].push(val);
  saveState();
  renderLugares();
  const el = document.getElementById('lugar-' + lugarIdx);
  if (el) { el.classList.add('open'); document.getElementById('lugar-btn-' + lugarIdx).textContent = 'Ver menos ▲'; }
}

function getAllGastos() {
  const base = GASTOS_BASE
    .map((g, i) => ({...g, _id: 'b' + i}))
    .filter((_, i) => !hiddenBase.includes(i));
  const extra = extraGastos.map((g, i) => ({...g, _id: 'e' + i}));
  return [...base, ...extra].sort((a, b) => a.dia - b.dia);
}

function calcTotalDia(dia) {
  const gastos = getAllGastos().filter(g => g.dia === dia);
  const eur = gastos.filter(g => g.moneda === 'EUR').reduce((s, g) => s + g.valor, 0);
  const usd = gastos.filter(g => g.moneda === 'USD').reduce((s, g) => s + g.valor, 0);
  let parts = [];
  if (eur > 0) parts.push(fmt(eur, eur % 1 ? 2 : 0) + ' €');
  if (usd > 0) parts.push(fmt(usd, 0) + ' USD');
  return parts.join(' + ') || '0 €';
}

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  currentPage = name;
  document.getElementById('fab-btn').style.display = name === 'gastos' ? 'flex' : 'none';
  if (name === 'gastos') renderGastos();
  if (name === 'presupuesto') renderPresupuesto();
}

// ITINERARIO
// ========================
function catClass(cat) {
  const c = cat.replace(/[^a-zA-ZáéíóúÁÉÍÓÚ]/g, '');
  const map = {
    'Alimentación': 'cat-Alimentación', 'Alimentacion': 'cat-Alimentación',
    'Transporte': 'cat-Transporte', 'Hotel': 'cat-Hotel',
    'Entradas': 'cat-Entradas', 'Celebración': 'cat-Celebración', 'Celebracion': 'cat-Celebración',
    'Varios': 'cat-Varios', 'Vuelos': 'cat-Vuelos',
  };
  return map[cat] || 'cat-default';
}

function renderItinerario() {
  const container = document.getElementById('page-itinerario');
  container.innerHTML = '';
  ITINERARIO.forEach(day => {
    const gastosDia = getAllGastos().filter(g => g.dia === day.dia);
    const expHtml = gastosDia.map(g => `
      <div class="expense-item">
        <span class="expense-name">${g.nombre}</span>
        <span class="expense-cat ${catClass(g.cat)}">${g.cat}</span>
        <span class="expense-amount">${fmt(g.valor)} ${g.moneda === 'EUR' ? '€' : g.moneda === 'USD' ? 'USD' : 'COP'}</span>
        <button class="edit-btn" onclick="openEdit('${g._id}',event)">✏️</button>
      </div>
    `).join('');
    const viajeVal = (customDays[day.dia] && customDays[day.dia].viaje !== undefined) ? customDays[day.dia].viaje : day.viaje;
    const travelHtml = viajeVal ? `<div class="day-travel">✈️ ${viajeVal}</div>` : '';

    // budget bar — supports EUR and/or USD days
    function makeBudgetBar(plan, real, symbol) {
      if (plan <= 0) return '';
      const diff = real - plan;
      const over = diff > 0;
      const pct = Math.min(real / plan * 100, 100);
      const barColor = over ? 'var(--rojo)' : 'var(--verde)';
      const diffLabel = over
        ? `<span style="color:var(--rojo);font-weight:700">+${fmt(Math.abs(diff),0)} ${symbol} sobre presupuesto</span>`
        : diff < 0
          ? `<span style="color:var(--verde);font-weight:700">${fmt(Math.abs(diff),0)} ${symbol} disponibles</span>`
          : `<span style="color:var(--verde);font-weight:700">Justo al presupuesto</span>`;
      const monedaKey = symbol === '€' ? 'EUR' : 'USD';
      return `<div class="budget-bar-wrap">
        <div class="budget-bar-labels">
          <span class="budget-edit-label" onclick="editBudget(${day.dia},'${monedaKey}',${plan})">Límite: ${fmt(plan,0)} ${symbol} ✏️</span>
          ${diffLabel}
        </div>
        <div class="budget-bar-track">
          <div class="budget-bar-fill" style="width:${pct}%;background:${barColor}"></div>
          ${over ? `<div class="budget-bar-over" style="width:${Math.min((diff/plan)*100,30)}%"></div>` : ''}
        </div>
      </div>`;
    }
    const planEUR = getPlannedEUR(day.dia);
    const planUSD = getPlannedUSD(day.dia);
    const realEUR = gastosDia.filter(g => g.moneda === 'EUR').reduce((s, g) => s + g.valor, 0);
    const realUSD = gastosDia.filter(g => g.moneda === 'USD').reduce((s, g) => s + g.valor, 0);
    const budgetBar = makeBudgetBar(planEUR, realEUR, '€') + makeBudgetBar(planUSD, realUSD, 'USD');

    // notes
    const noteVal = (dayNotes[day.dia] || '').replace(/"/g, '&quot;');
    const notesHtml = `
      <div class="day-notes-wrap">
        <div class="day-notes-label">📝 Notas del día <span class="note-saved" id="note-saved-${day.dia}">✓ guardado</span></div>
        <textarea class="day-notes-input" placeholder="Restaurantes, recuerdos, tips..." oninput="onNoteInput(${day.dia}, this.value)">${noteVal}</textarea>
      </div>`;

    container.innerHTML += `
      <div class="day-card">
        <div class="day-header" onclick="toggleDay(${day.dia})">
          <div class="day-number">D${day.dia}</div>
          <div class="day-info">
            <div class="day-title">${(customDays[day.dia] && customDays[day.dia].ciudad) || day.ciudad}</div>
            <div class="day-subtitle">${day.fecha}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="day-total">${calcTotalDia(day.dia)}</div>
            <button class="day-edit-btn" onclick="openDayEdit(${day.dia},event)" title="Editar día">✏️</button>
          </div>
        </div>
        <div class="day-body" id="day-body-${day.dia}">
          ${travelHtml}
          <div class="day-plan">${(customDays[day.dia] && customDays[day.dia].plan) || day.plan}</div>
          ${budgetBar}
          ${gastosDia.length ? '<div class="expense-list">' + expHtml + '</div>' : ''}
          ${notesHtml}
        </div>
      </div>
    `;
  });
}

function toggleDay(dia) {
  const body = document.getElementById('day-body-' + dia);
  body.classList.toggle('open');
}

function renderGastos() {
  const gastos = getAllGastos();
  const cats = ['Todos', ...new Set(gastos.map(g => g.cat))];
  const search = document.getElementById('gastos-search') ? document.getElementById('gastos-search').value.toLowerCase() : '';

  const container = document.getElementById('page-gastos');
  const filterRow = `<div class="filter-row" id="filter-row">
    ${cats.map(c => `<button class="filter-chip${c === activeFilter ? ' active' : ''}" onclick="setFilter('${c}')">${c}</button>`).join('')}
  </div>`;

  let filtered = gastos;
  if (activeFilter !== 'Todos') filtered = filtered.filter(g => g.cat === activeFilter);
  if (search) filtered = filtered.filter(g => g.nombre.toLowerCase().includes(search) || g.ciudad.toLowerCase().includes(search));

  const totalEUR = filtered.filter(g => g.moneda === 'EUR').reduce((s, g) => s + g.valor, 0);
  const totalUSD = filtered.filter(g => g.moneda === 'USD').reduce((s, g) => s + g.valor, 0);

  const summary = `<div class="card" style="display:flex;gap:16px;justify-content:center;text-align:center">
    <div><div style="font-size:11px;color:var(--gris);font-weight:600">TOTAL EUR</div><div style="font-size:22px;font-weight:800;color:var(--rojo)">${fmt(totalEUR,2)} €</div></div>
    <div style="width:1px;background:#eee"></div>
    <div><div style="font-size:11px;color:var(--gris);font-weight:600">TOTAL USD</div><div style="font-size:22px;font-weight:800;color:var(--azul)">${fmt(totalUSD,2)} USD</div></div>
  </div>`;

  const items = filtered.length ? filtered.map((g, i) => {
    const isNew = i >= GASTOS_BASE.length - 1 && extraGastos.find(e => e === g);
    return `<div class="expense-full-item">
      <div class="expense-full-left">
        <div class="expense-full-name">${g.nombre}${isNew ? '<span class="tag-new">NUEVO</span>' : ''}</div>
        <div class="expense-full-meta">${g.fecha} · ${g.ciudad} · <span class="expense-cat ${catClass(g.cat)}" style="display:inline">${g.cat}</span></div>
      </div>
      <div style="text-align:right">
        <div class="expense-full-amount">${fmt(g.valor)}</div>
        <div class="expense-full-currency">${g.moneda}</div>
      </div>
    </div>`;
  }).join('') : `<div class="empty-state"><div class="emoji">🔍</div><p>No hay gastos con ese filtro</p></div>`;

  container.innerHTML = `
    <input class="search-input" id="gastos-search" placeholder="🔍 Buscar gasto..." oninput="renderGastos()" value="${search}" />
    ${filterRow}
    ${summary}
    ${items}
  `;
}

function setFilter(cat) {
  activeFilter = cat;
  renderGastos();
}

// ========================
// PRESUPUESTO
// ========================
function renderPresupuesto() {
  const gastos = getAllGastos();
  const totalEUR = gastos.filter(g => g.moneda === 'EUR').reduce((s, g) => s + g.valor, 0);
  const totalUSD = gastos.filter(g => g.moneda === 'USD').reduce((s, g) => s + g.valor, 0);

  const TASA_EUR = 4038.32;
  const TASA_USD = 3444.06;
  const copEUR = totalEUR * TASA_EUR;
  const copUSD = totalUSD * TASA_USD;
  const copTotal = copEUR + copUSD;
  const copTiquetes = 3200 * TASA_USD;
  const copGrandTotal = copTotal + copTiquetes;

  const cats = {};
  gastos.forEach(g => {
    if (!cats[g.cat]) cats[g.cat] = { EUR: 0, USD: 0 };
    cats[g.cat][g.moneda] = (cats[g.cat][g.moneda] || 0) + g.valor;
  });
  const catColors = {
    'Alimentación': '#f39c12', 'Transporte': '#2980b9', 'Hotel': '#8e44ad',
    'Entradas': '#27ae60', 'Celebración': '#e74c3c', 'Varios': '#7f8c8d',
    'Vuelos': '#1abc9c', 'Viaje / sala VIP': '#16a085',
  };

  const maxEUR = Math.max(...Object.values(cats).map(c => (c.EUR || 0)));

  const barsHtml = Object.entries(cats).sort((a, b) => (b[1].EUR || 0) - (a[1].EUR || 0)).map(([cat, vals]) => {
    const eurVal = vals.EUR || 0;
    const usdVal = vals.USD || 0;
    const pct = maxEUR > 0 ? (eurVal / maxEUR * 100) : 0;
    const color = catColors[cat] || '#bdc3c7';
    return `<div class="bar-item">
      <div class="bar-label-row">
        <span class="bar-label">${cat}</span>
        <span style="color:var(--gris)">${eurVal > 0 ? fmt(eurVal,2) + ' €' : ''}${usdVal > 0 ? (eurVal > 0 ? ' + ' : '') + usdVal + ' USD' : ''}</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
  }).join('');

  const container = document.getElementById('page-presupuesto');
  container.innerHTML = `
    <div class="budget-hero">
      <div class="budget-hero-label">TOTAL OPERATIVO SIN TIQUETES</div>
      <div class="budget-hero-amount">${fmt(totalEUR,2)} €</div>
      <div class="budget-hero-sub">+ ${fmt(totalUSD,2)} USD · ${fmt(copTotal,0)} COP aprox.</div>
    </div>

    <div class="budget-grid">
      <div class="budget-stat">
        <div class="budget-stat-label">Gastos en EUR</div>
        <div class="budget-stat-val" style="color:var(--rojo)">${fmt(totalEUR,2)}</div>
        <div class="budget-stat-sub">euros</div>
      </div>
      <div class="budget-stat">
        <div class="budget-stat-label">Gastos en USD</div>
        <div class="budget-stat-val" style="color:var(--azul)">${fmt(totalUSD,2)}</div>
        <div class="budget-stat-sub">dólares</div>
      </div>
      <div class="budget-stat">
        <div class="budget-stat-label">Tiquetes int.</div>
        <div class="budget-stat-val" style="color:var(--naranja)">3.200</div>
        <div class="budget-stat-sub">USD · separado</div>
      </div>
      <div class="budget-stat">
        <div class="budget-stat-label">Gran total COP</div>
        <div class="budget-stat-val" style="color:var(--verde);font-size:15px">${(copGrandTotal/1000000).toFixed(1)}M</div>
        <div class="budget-stat-sub">incluye tiquetes</div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Gasto por categoría (EUR)</div>
      ${barsHtml}
    </div>

    <div class="card">
      <div class="section-title">Conversión a pesos colombianos</div>
      <table class="cop-table">
        <tr><th>Concepto</th><th class="right">COP aprox.</th></tr>
        <tr><td>Gastos en EUR (× ${fmt(TASA_EUR,2)})</td><td class="right">$${fmt(copEUR,0)}</td></tr>
        <tr><td>Gastos en USD (× ${fmt(TASA_USD,2)})</td><td class="right">$${fmt(copUSD,0)}</td></tr>
        <tr><td>Subtotal sin tiquetes</td><td class="right">$${fmt(copTotal,0)}</td></tr>
        <tr><td>Tiquetes 3.200 USD</td><td class="right">$${fmt(copTiquetes,0)}</td></tr>
        <tr><td>GRAN TOTAL</td><td class="right" style="color:var(--rojo)">$${fmt(copGrandTotal,0)}</td></tr>
      </table>
      <div style="font-size:10px;color:var(--gris);margin-top:8px">Tasas: 1 EUR = 4.038,32 COP · 1 USD = 3.444,06 COP</div>
    </div>

    <div class="card">
      <div class="section-title">Backup de datos</div>
      <p style="font-size:12px;color:var(--gris);margin-bottom:12px">Guarda o restaura los gastos que hayas agregado o editado.</p>
      <button class="btn-backup" onclick="exportBackup()">⬇️ Descargar backup</button>
      <label class="btn-restore">
        ⬆️ Restaurar backup
        <input type="file" accept=".json" onchange="importBackup(event)" style="display:none" />
      </label>
    </div>
  `;
}

              </div>

        <div class="hl-add-row">

function startEditHighlight(lugarIdx, itemIdx) {
  const li = document.getElementById('hl-' + lugarIdx + '-' + itemIdx);
  if (!li) return;
  const current = getLugarHighlights(lugarIdx)[itemIdx];
  li.innerHTML = `
    <input class="hl-edit-input" id="hl-inp-${lugarIdx}-${itemIdx}" value="${current}" />
    <button class="hl-save-btn" onclick="saveHighlight(${lugarIdx},${itemIdx},document.getElementById('hl-inp-${lugarIdx}-${itemIdx}').value.trim())">✓</button>
  `;
  document.getElementById('hl-inp-' + lugarIdx + '-' + itemIdx).focus();
}

function toggleLugar(i) {
  const el = document.getElementById('lugar-' + i);
  const btn = document.getElementById('lugar-btn-' + i);
  el.classList.toggle('open');
  btn.textContent = el.classList.contains('open') ? 'Ver menos ▲' : 'Ver más ▼';
}

function openModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = '➕ Nuevo gasto';
  const sel = document.getElementById('inp-dia');
  sel.innerHTML = ITINERARIO.map(d => `<option value="${d.dia}">Día ${d.dia} — ${d.ciudad}</option>`).join('');
  document.getElementById('inp-nombre').value = '';
  document.getElementById('inp-valor').value = '';
  document.getElementById('inp-moneda').value = 'EUR';
  document.getElementById('inp-cat').value = 'Alimentación';
  document.getElementById('btn-delete').style.display = 'none';
  document.getElementById('modal-overlay').classList.add('open');
}

function openEdit(id, e) {
  e.stopPropagation();
  const g = getAllGastos().find(x => x._id === id);
  if (!g) return;
  editingId = id;
  document.getElementById('modal-title').textContent = '✏️ Editar gasto';
  const sel = document.getElementById('inp-dia');
  sel.innerHTML = ITINERARIO.map(d => `<option value="${d.dia}">Día ${d.dia} — ${d.ciudad}</option>`).join('');
  document.getElementById('inp-nombre').value = g.nombre;
  document.getElementById('inp-valor').value = g.valor;
  document.getElementById('inp-moneda').value = g.moneda;
  document.getElementById('inp-cat').value = g.cat;
  sel.value = g.dia;
  document.getElementById('btn-delete').style.display = 'block';
  document.getElementById('modal-overlay').classList.add('open');
}

function deleteExpense() {
  if (!editingId) return;
  if (!confirm('¿Eliminar este gasto?')) return;
  if (editingId.startsWith('b')) {
    const baseIdx = parseInt(editingId.slice(1));
    if (!hiddenBase.includes(baseIdx)) hiddenBase.push(baseIdx);
  } else {
    const extraIdx = parseInt(editingId.slice(1));
    extraGastos.splice(extraIdx, 1);
  }
  saveState();
  closeModal();
  showToast('🗑 Gasto eliminado');
  renderGastos();
  renderItinerario();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingId = null;
}
function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function addExpense() {
  const nombre = document.getElementById('inp-nombre').value.trim();
  const valor = parseFloat(document.getElementById('inp-valor').value);
  const moneda = document.getElementById('inp-moneda').value;
  const cat = document.getElementById('inp-cat').value;
  const diaIdx = parseInt(document.getElementById('inp-dia').value);
  const day = ITINERARIO.find(d => d.dia === diaIdx);
  if (!nombre || isNaN(valor) || valor <= 0) {
    showToast('⚠️ Completa todos los campos');
    return;
  }
  const g = { dia: diaIdx, fecha: day.fecha, ciudad: day.ciudad, cat, nombre, moneda, valor };

  if (editingId) {
    if (editingId.startsWith('b')) {
      // gasto base: ocultarlo y guardar versión editada como extra
      const baseIdx = parseInt(editingId.slice(1));
      if (!hiddenBase.includes(baseIdx)) hiddenBase.push(baseIdx);
    } else {
      // gasto extra: eliminarlo para reemplazarlo
      const extraIdx = parseInt(editingId.slice(1));
      extraGastos.splice(extraIdx, 1);
    }
  }

  extraGastos.push(g);
  saveState();
  closeModal();
  showToast(editingId ? '✅ Gasto actualizado' : '✅ Gasto guardado');
  renderGastos();
  renderItinerario();
}

function exportBackup() {
  const data = { espana_gastos: extraGastos, espana_hidden: hiddenBase, espana_highlights: customHighlights, espana_checked: checkedHighlights, espana_notes: dayNotes, espana_budgets: customBudgets, espana_days: customDays, fecha: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'espana2026-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('⬇️ Backup descargado');
}

function importBackup(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.espana_gastos || !data.espana_hidden) throw new Error('Formato inválido');
      extraGastos = data.espana_gastos;
      hiddenBase = data.espana_hidden;
      customHighlights = data.espana_highlights || {};
      checkedHighlights = data.espana_checked || {};
      dayNotes = data.espana_notes || {};
      customBudgets = data.espana_budgets || {};
      customDays = data.espana_days || {};
      saveState();
      showToast('✅ Backup restaurado');
      renderPresupuesto();
      renderGastos();
      renderItinerario();
    } catch(err) {
      showToast('⚠️ Archivo inválido');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ========================
// INIT
// ========================
renderItinerario();
renderLugares();
</script>
